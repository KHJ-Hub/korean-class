<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나희덕 - <푸른 밤> 학습실</title>
    <style>
        :root { --main-dark: #0f172a; --point-blue: #38bdf8; --text-gray: #94a3b8; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--main-dark); color: #f8fafc; line-height: 1.8; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* 헤더 스타일 */
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #334155; margin-bottom: 40px; }
        h1 { color: var(--point-blue); font-size: 2rem; margin: 0; }
        .author { color: var(--text-gray); margin-top: 10px; }

        /* 시 본문 영역 */
        .poem-box { background: rgba(30, 41, 59, 0.5); padding: 40px; border-radius: 20px; text-align: center; font-size: 1.15rem; border: 1px solid #1e293b; margin-bottom: 40px; }
        .stanza { margin-bottom: 30px; }
        .stanza-num { display: block; font-size: 0.8rem; color: var(--point-blue); margin-bottom: 10px; font-weight: bold; }

        /* 주석(툴팁) 스타일 */
        .tooltip { position: relative; display: inline-block; cursor: help; border-bottom: 1px dashed var(--point-blue); color: #fff; }
        .tooltip .tooltiptext { visibility: hidden; width: 240px; background-color: #1e293b; color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: absolute; z-index: 10; bottom: 125%; left: 50%; margin-left: -120px; opacity: 0; transition: opacity 0.3s; font-size: 0.85rem; border: 1px solid var(--point-blue); box-shadow: 0 10px 20px rgba(0,0,0,0.3); line-height: 1.4; }
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

        /* 분석 카드 스타일 */
        .analysis-section { display: grid; gap: 20px; margin-bottom: 50px; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; border-left: 5px solid var(--point-blue); }
        .card h3 { margin: 0 0 15px 0; color: var(--point-blue); font-size: 1.2rem; }
        .card ul { margin: 0; padding-left: 20px; color: #cbd5e1; font-size: 0.95rem; }
        .card li { margin-bottom: 8px; }

        /* 하이라이트 */
        .hl { color: #f472b6; font-weight: bold; }

        /* 버튼 */
        .btn-back { display: block; width: 120px; margin: 40px auto; padding: 12px; text-align: center; background: var(--point-blue); color: var(--main-dark); text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { background: #7dd3fc; transform: scale(1.05); }

        @media (max-width: 600px) { .poem-box { padding: 20px; font-size: 1rem; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌌 &lt;푸른 밤&gt;</h1>
        <p class="author">나희덕</p>
    </header>

    <div class="poem-box">
        <div class="stanza">
            <span class="stanza-num">[1연]</span>
            <span class="tooltip">너에게 가려고 비틀거렸던 날들<span class="tooltiptext">'너'에게 도달하기 위한 시적 화자의 시련과 고뇌</span></span>,<br>
            내 발자국에 고인 <span class="hl">푸른 밤</span>을 기억해.<br>
            지상에 발을 붙이고 산다는 것,<br>
            그것이 얼마나 <span class="hl">가장 낮은 곳</span>으로<br>
            나를 이끌어 가는지
