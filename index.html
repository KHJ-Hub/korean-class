<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문학의 네 가지 갈래 학습소</title>
    <style>
        :root { --main-blue: #1e3a8a; --sub-blue: #3b82f6; --bg-gray: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg-gray); color: #1e293b; line-height: 1.6; }
        header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 3.5rem 1rem; text-align: center; }
        .container { max-width: 1000px; margin: -2rem auto 3rem; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .genre-card { 
            background: white; border-radius: 15px; padding: 30px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 1px solid #e2e8f0;
        }
        .genre-card:hover { transform: translateY(-7px); border-color: var(--sub-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .genre-card h3 { color: var(--main-blue); font-size: 1.4rem; margin-bottom: 10px; }
        .genre-card p { font-size: 0.9rem; color: #64748b; }
        .icon { font-size: 2.5rem; margin-bottom: 15px; display: block; }
        footer { text-align: center; padding: 40px; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>📖 문학의 네 가지 갈래</h1>
    <p>1학년 국어 문학 단원 통합 학습 저장소</p>
</header>

<div class="container">
    <div class="grid">
        <div class="genre-card" onclick="location.href='seojeong.html'">
            <span class="icon">🌸</span>
            <h3>1. 서정 갈래의 이해</h3>
            <p>시, 노래 등 주관적 정서의 표현</p>
        </div>

        <div class="genre-card" onclick="location.href='seosa.html'">
            <span class="icon">📚</span>
            <h3>2. 서사 갈래의 이해</h3>
            <p>소설, 신화 등 사건과 이야기</p>
        </div>

        <div class="genre-card" onclick="location.href='geuk.html'">
            <span class="icon">🎭</span>
            <h3>3. 극 갈래의 이해</h3>
            <p>희곡, 시나리오 등 대사와 행동</p>
        </div>

        <div class="genre-card" onclick="location.href='gyosul.html'">
            <span class="icon">✍️</span>
            <h3>4. 교술 갈래의 이해</h3>
            <p>수필, 일기 등 경험과 성찰</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 1학년 문학 담당 김현정 선생님</p>
</footer>

</body>
</html>
