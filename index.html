<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>문학의 네 가지 갈래 학습소</title>
    <meta property="og:title" content="문학의 네 가지 갈래 학습 저장소">
    <meta property="og:description" content="현정쌤과 함께하는 배정고 １학년 문학 공부방">
    <meta property="og:type" content="website">
    <meta property="og:image" content=""> 

    <style>
        :root { 
            --main-blue: #1e3a8a; 
            --sub-blue: #3b82f6; 
            --bg-gray: #f1f5f9; 
            --text-dark: #1e293b;
        }
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            margin: 0; 
            background-color: var(--bg-gray); 
            color: var(--text-dark); 
            line-height: 1.6; 
        }
        
        header { 
            background: linear-gradient(135deg, var(--main-blue), var(--sub-blue)); 
            color: white; 
            padding: 3.5rem 1rem; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 2.2rem; letter-spacing: -0.05em; }
        header p { margin: 10px 0 0; opacity: 0.9; font-weight: 300; }

        .container { max-width: 1000px; margin: -2.5rem auto 3rem; padding: 0 20px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
        }
        
        /* 갈래 카드 스타일 */
        .genre-card { 
            background: white; 
            border-radius: 18px; 
            padding: 35px 25px; 
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: all 0.3s ease; 
            cursor: pointer; 
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .genre-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--sub-blue); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
        }
        .genre-card h3 { 
            color: var(--main-blue); 
            font-size: 1.35rem; 
            margin: 15px 0 10px; 
            word-break: keep-all;
        }
        .genre-card p { 
            font-size: 0.95rem; 
            color: #64748b; 
            margin: 0;
            font-weight: 500;
        }
        .icon { 
            font-size: 3rem; 
            margin-bottom: 5px; 
            display: block; 
        }

        footer { 
            text-align: center; 
            padding: 50px 20px; 
            color: #94a3b8; 
            font-size: 0.85rem; 
            border-top: 1px solid #e2e8f0;
            background: white;
            margin-top: 40px;
        }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .genre-card { padding: 25px 15px; }
        }
    </style>
</head>
<body>

<header>
    <h1>📖 문학의 네 가지 갈래</h1>
    <p>동아출판(최두호) 공통국어1 문학 통합 학습 저장소</p>
</header>

<div class="container">
    <div class="grid">
        <div class="genre-card" onclick="location.href='seojeong.html'">
            <span class="icon">🌸</span>
            <h3>1. 서정 갈래의 이해</h3>
            <p>나희덕, &lt;푸른 밤&gt;</p>
        </div>

        <div class="genre-card" onclick="location.href='seosa.html'">
            <span class="icon">🌉</span>
            <h3>2. 서사 갈래의 이해</h3>
            <p>이태준, &lt;돌다리&gt;</p>
        </div>

        <div class="genre-card" onclick="location.href='geuk.html'">
            <span class="icon">📺</span>
            <h3>3. 극 갈래의 이해</h3>
            <p>노희경, &lt;우리들의 블루스&gt;</p>
        </div>

        <div class="genre-card" onclick="location.href='gyosul.html'">
            <span class="icon">👤</span>
            <h3>4. 교술 갈래의 이해</h3>
            <p>이규보, &lt;이상한 관상가와의 대화&gt;</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 1학년 국어 담당 김현정 선생님<br>본 사이트는 교육용 자료 저장소입니다.</p>
</footer>

</body>
</html>
